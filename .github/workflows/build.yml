name: Build Mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SMAPI
        run: |
          wget https://github.com/Pathoschild/SMAPI/releases/latest/download/SMAPI-4.5.1-installer.zip -O smapi.zip
          unzip smapi.zip -d smapi
          find smapi -name "StardewModdingAPI.dll" -exec cp {} libs/ \;

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatingCursorMod
          path: bin/Release/net6.0/